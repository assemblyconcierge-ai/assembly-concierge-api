services:
  - type: web
    name: assembly-concierge-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: assembly-concierge-db
          property: connectionString

databases:
  - name: assembly-concierge-db
    plan: free
    databaseName: assembly_concierge
    user: ac_user
